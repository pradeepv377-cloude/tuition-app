name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: |
          for entry in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            dir="${entry%%:*}"
            size="${entry##*:}"
            mkdir -p "android/app/src/main/res/$dir"
            convert -size ${size}x${size} xc:"#1976D2" -fill white \
              -font DejaVu-Sans-Bold -pointsize $((size/3)) \
              -gravity center -annotate 0 "T" \
              "android/app/src/main/res/$dir/ic_launcher.png"
          done

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TuitionPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
